<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
</head>
<body style="background-color: beige;">
    <h1>{{ title }}</h1>

    {% if error_msg %}
        <p style="color: red;"><strong>Error:</strong> {{ error_msg }}</p>
    {% else %}
        {% if data_type == 'list' %}
            <p>Total items: {{ data|length }}</p>
            <ul>
            {% for item in data %}
                <li>{{ item }}</li>
            {% endfor %}
            </ul>
        {% elif data_type == 'text' %}
            <p>{{ data }}</p>
        {% endif %}
    {% endif %}

    <br>
    <a href="/" class="btn">Back to Home</a>
</body>
</html>
